apiVersion: apps/v1
kind: Deployment
metadata:
  name: statefuldaemonset-controller
  namespace: sds-lab-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statefuldaemonset-controller
  template:
    metadata:
      labels:
        app: statefuldaemonset-controller
    spec:
      serviceAccountName: statefuldaemonset-controller
      containers:
        - name: controller
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "-u", "/app/controller.py"]
          volumeMounts:
            - name: code
              mountPath: /app
      volumes:
        - name: code
          configMap:
            name: statefuldaemonset-controller-code
