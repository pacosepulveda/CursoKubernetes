apiVersion: v1
kind: Namespace
metadata:
  name: rbac-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: rbac-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rbac-student
  namespace: rbac-test
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: workload-reader
  namespace: rbac-test
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rbac-student-workload-reader
  namespace: rbac-test
subjects:
- kind: ServiceAccount
  name: rbac-student
  namespace: rbac-test
roleRef:
  kind: Role
  name: workload-reader
  apiGroup: rbac.authorization.k8s.io
