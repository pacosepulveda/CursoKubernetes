apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: aquila
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
  template:
    metadata:
      labels:
        app: portal
    spec:
      containers:
        - name: portal
          image: hashicorp/http-echo:0.2.3
          args:
            - "-listen=:8080"
            - "-text=Aquila Portal | Servicio web publico | Version estable"
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: portal-service
  namespace: aquila
spec:
  selector:
    app: portal
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
