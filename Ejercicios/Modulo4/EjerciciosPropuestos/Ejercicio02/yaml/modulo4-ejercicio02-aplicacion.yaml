apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-frontend
  labels:
    app: portal
    tier: frontend
  annotations:
    curso.kubernetes.io/modulo: "4"
    curso.kubernetes.io/descripcion: "Frontend de ejemplo para practicar labels y annotations"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portal
      tier: frontend
  template:
    metadata:
      labels:
        app: portal
        tier: frontend
      annotations:
        curso.kubernetes.io/componente: "frontend"
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal-backend
  labels:
    app: portal
    tier: backend
  annotations:
    curso.kubernetes.io/modulo: "4"
    curso.kubernetes.io/descripcion: "Backend simulado para practicar labels y annotations"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portal
      tier: backend
  template:
    metadata:
      labels:
        app: portal
        tier: backend
      annotations:
        curso.kubernetes.io/componente: "backend"
    spec:
      containers:
        - name: backend
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              while true; do
                echo "backend activo"
                sleep 30
              done
