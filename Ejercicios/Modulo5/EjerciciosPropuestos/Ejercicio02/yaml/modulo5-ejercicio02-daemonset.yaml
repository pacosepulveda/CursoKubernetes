apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: auditor-nodo
  labels:
    app: auditor-nodo
    modulo: "5"
spec:
  selector:
    matchLabels:
      app: auditor-nodo
  template:
    metadata:
      labels:
        app: auditor-nodo
    spec:
      containers:
        - name: auditor
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              while true; do
                echo "Nodo visto desde el Pod: $(hostname)"
                date
                sleep 20
              done
