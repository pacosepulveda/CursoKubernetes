apiVersion: v1
kind: Service
metadata:
  name: catalog-web-nodeport
  namespace: svc-troubleshooting
  labels:
    app: catalog-web
    exercise: troubleshooting
spec:
  type: NodePort
  selector:
    app: catalog-web
    component: frontend
  ports:
    - name: http
      port: 80
      # ERROR INTENCIONADO:
      # El Service publica el NodePort correctamente, pero reenvía al puerto equivocado del Pod.
      targetPort: 8080
      nodePort: 30081
      protocol: TCP
