apiVersion: v1
kind: Pod
metadata:
  name: client
  namespace: my-nginx
  labels:
    app: client
spec:
  restartPolicy: Never
  containers:
    - name: client
      image: curlimages/curl:8.11.1
      command: ["sleep", "3600"]
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          cpu: 50m
          memory: 64Mi
