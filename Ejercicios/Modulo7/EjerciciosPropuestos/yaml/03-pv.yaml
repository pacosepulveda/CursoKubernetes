apiVersion: v1
kind: PersistentVolume
metadata:
  name: pv-reporting-local
spec:
  capacity:
    storage: 1Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: manual-retain
  hostPath:
    path: /tmp/k8s-m7-reporting
    type: DirectoryOrCreate
