apiVersion: v1
kind: Pod
metadata:
  name: nginx-cm-volume
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      volumeMounts:
        - name: config-volume
          mountPath: /etc/lala
          readOnly: true
  volumes:
    - name: config-volume
      configMap:
        name: cmvolume
  restartPolicy: Never
