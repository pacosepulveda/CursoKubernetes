apiVersion: v1
kind: Pod
metadata:
  name: pod-local-pvc
  labels:
    app: local-pvc-demo
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: web-data
          mountPath: /usr/share/nginx/html
  volumes:
    - name: web-data
      persistentVolumeClaim:
        claimName: pvc-local-1
