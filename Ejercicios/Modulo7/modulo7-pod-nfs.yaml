apiVersion: v1
kind: Pod
metadata:
  name: pod-nfs-demo
  labels:
    app: pod-nfs-demo
spec:
  containers:
    - name: nginx
      image: nginx:1.27-alpine
      ports:
        - containerPort: 80
      volumeMounts:
        - name: nfs-data
          mountPath: /usr/share/nginx/html
  volumes:
    - name: nfs-data
      persistentVolumeClaim:
        claimName: pvc-nfs
