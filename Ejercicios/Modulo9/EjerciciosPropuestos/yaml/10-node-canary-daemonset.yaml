apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: node-canary
  namespace: cka-node-troubleshooting
spec:
  selector:
    matchLabels:
      app: node-canary
  template:
    metadata:
      labels:
        app: node-canary
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      containers:
        - name: canary
          image: registry.k8s.io/pause:3.10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 50m
              memory: 64Mi