apiVersion: v1
kind: Service
metadata:
  name: headlamp-nodeport
  namespace: headlamp
  labels:
    app.kubernetes.io/name: headlamp
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: headlamp
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 4466
      nodePort: 30090
